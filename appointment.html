<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Appointment</title>
    <link rel="stylesheet" href="css/hospital-theme.css?v=20260619">
    <link rel="stylesheet" href="css/hss-spine.css?v=20260619">
</head>
<body class="hss-page" data-page="appointment" data-i18n-title="pages.appointment.title">
    <div id="site-nav"></div>
    <header class="hss-hero hss-hero--inner">
        <div class="hss-wrap">
            <h1 data-i18n="pages.appointment.heroTitle">—</h1>
            <p class="hss-hero__tagline" data-i18n="pages.appointment.heroDesc">—</p>
        </div>
    </header>
    <section class="hss-section">
        <div class="hss-wrap hss-booking">
            <div id="appointment-success" class="hss-alert" hidden data-i18n="pages.appointment.success">—</div>
            <p class="hss-booking__intro" data-i18n="pages.appointment.intro">—</p>
            <form class="hss-form" id="appointment-form">
                <fieldset class="hss-form__section">
                    <legend data-i18n="pages.appointment.sectionContact">—</legend>
                    <div class="hss-form__row">
                        <label class="hss-field">
                            <span data-i18n="pages.appointment.patientName">—</span>
                            <input type="text" name="patientName" required>
                        </label>
                        <label class="hss-field">
                            <span data-i18n="pages.appointment.phone">—</span>
                            <input type="tel" name="phone" required>
                        </label>
                    </div>
                    <label class="hss-field">
                        <span data-i18n="pages.appointment.email">—</span>
                        <input type="email" name="email">
                    </label>
                </fieldset>
                <fieldset class="hss-form__section">
                    <legend data-i18n="pages.appointment.sectionService">—</legend>
                    <div class="hss-form__row">
                        <label class="hss-field">
                            <span data-i18n="pages.appointment.department">—</span>
                            <select name="departmentId" required data-i18n-default-option="pages.appointment.department">
                                <option value="">—</option>
                            </select>
                        </label>
                        <label class="hss-field">
                            <span data-i18n="common.optionalDoctor">—</span>
                            <select name="doctorId" data-i18n-default-option="common.optionalDoctor">
                                <option value="">—</option>
                            </select>
                        </label>
                    </div>
                </fieldset>
                <fieldset class="hss-form__section">
                    <legend data-i18n="pages.appointment.sectionDate">—</legend>
                    <div class="hss-form__row">
                        <label class="hss-field">
                            <span data-i18n="pages.appointment.date">—</span>
                            <input type="date" name="date" required>
                        </label>
                        <label class="hss-field">
                            <span data-i18n="pages.appointment.time">—</span>
                            <select name="time" required data-i18n-default-option="pages.appointment.time">
                                <option value="">—</option>
                            </select>
                        </label>
                    </div>
                    <label class="hss-field">
                        <span data-i18n="pages.appointment.comment">—</span>
                        <textarea name="comment" rows="4"></textarea>
                    </label>
                </fieldset>
                <label class="hss-consent-field">
                    <input type="checkbox" name="privacyConsent" required>
                    <span id="form-privacy-consent-text"></span>
                </label>
                <button type="submit" class="hss-btn hss-btn--primary hss-btn--lg" data-i18n="pages.appointment.submit">—</button>
            </form>
            <p class="hss-booking__emergency">
                <span data-i18n="pages.appointment.emergencyHint">—</span> <strong id="appointment-emergency">103</strong>
            </p>
        </div>
    </section>
    <div id="site-footer"></div>
    <script src="js/storage.js"></script>
    <script src="js/api-config.js?v=20260618"></script>
    <script src="js/api-submit.js?v=20260618"></script>
    <script src="js/i18n.js"></script>
    <script src="js/cms-config.js"></script>
    <script src="js/cms-content.js"></script>
    <script src="js/common.js"></script>
    <script src="js/appointment.js"></script>
</body>
</html>
