# Healthy Spine (hivandanoc) — production with Let's Encrypt SSL

# Redirect HTTP → HTTPS (canonical non-www)
server {
    listen 80;
    listen [::]:80;
    server_name healthyspinedoc.com www.healthyspinedoc.com;
    return 301 https://healthyspinedoc.com$request_uri;
}

# Redirect www HTTPS → non-www canonical
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.healthyspinedoc.com;

    ssl_certificate /etc/letsencrypt/live/healthyspinedoc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/healthyspinedoc.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://healthyspinedoc.com$request_uri;
}

# HTTPS — primary site
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name healthyspinedoc.com;

    ssl_certificate /etc/letsencrypt/live/healthyspinedoc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/healthyspinedoc.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/hivandanoc;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://maps.googleapis.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://maps.googleapis.com https://maps.gstatic.com; frame-src 'self' https://www.google.com https://maps.google.com https://www.openstreetmap.org; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://formsubmit.co" always;

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8765/api/v1/public/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        client_max_body_size 15m;
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://127.0.0.1:8765/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /admin-cms/ {
        expires off;
        etag off;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ =404;
    }

    location ~* ^/js/cms-edit-mode\.(js|css)$ {
        expires off;
        etag off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location ~* ^/js/(api-submit|api-config)\.js$ {
        expires off;
        etag off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location ~* ^/js/common\.js$ {
        expires off;
        etag off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location ~* ^/lang/.*\.json$ {
        expires off;
        etag off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location /admin/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ =404;
    }

    location = /doctors.html {
        return 301 https://healthyspinedoc.com/find-a-doctor;
    }

    location = /departments.html {
        return 301 https://healthyspinedoc.com/patient-care;
    }

    location = /about.html {
        return 301 https://healthyspinedoc.com/about;
    }

    location = /contacts.html {
        return 301 https://healthyspinedoc.com/locations;
    }

    location = /find-a-doctor {
        proxy_pass http://127.0.0.1:8765/find-a-doctor;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/find-a-doctor/[^/]+$ {
        try_files /doctors.html =404;
    }

    location = /locations {
        proxy_pass http://127.0.0.1:8765/locations;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /contact {
        proxy_pass http://127.0.0.1:8765/contact;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /patient-care {
        proxy_pass http://127.0.0.1:8765/patient-care;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/patient-care/[^/]+$ {
        try_files /departments.html =404;
    }

    location = /about {
        proxy_pass http://127.0.0.1:8765/about;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /move-better {
        try_files /move-better.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?|json|xml|txt)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain text/xml;
    gzip_min_length 256;
}

