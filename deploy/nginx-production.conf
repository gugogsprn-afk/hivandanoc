# Healthy Spine (hivandanoc) — production with Let's Encrypt SSL

# Redirect HTTP → HTTPS for domain names
server {
    listen 80;
    listen [::]:80;
    server_name healthyspinedoc.com www.healthyspinedoc.com;
    return 301 https://$host$request_uri;
}

# HTTPS — primary site
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name healthyspinedoc.com www.healthyspinedoc.com;

    ssl_certificate /etc/letsencrypt/live/healthyspinedoc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/healthyspinedoc.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/hivandanoc;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://formsubmit.co" always;

    location /api/ {
        proxy_pass http://127.0.0.1:8765/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /admin-cms/ {
        expires off;
        etag off;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ =404;
    }

    location ~* ^/js/cms-edit-mode\.(js|css)$ {
        expires off;
        etag off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location ~* ^/js/common\.js$ {
        expires off;
        etag off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location /admin/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?|json|xml|txt)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain text/xml;
    gzip_min_length 256;
}

