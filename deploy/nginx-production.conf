# Healthy Spine (hivandanoc) — production with Let's Encrypt SSL

# Redirect HTTP → HTTPS (canonical non-www)
server {
    listen 80;
    listen [::]:80;
    server_name healthyspinedoc.com www.healthyspinedoc.com;
    return 301 https://healthyspinedoc.com$request_uri;
}

# Redirect www HTTPS → non-www canonical
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.healthyspinedoc.com;

    ssl_certificate /etc/letsencrypt/live/healthyspinedoc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/healthyspinedoc.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://healthyspinedoc.com$request_uri;
}

# HTTPS — primary site
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name healthyspinedoc.com;

    ssl_certificate /etc/letsencrypt/live/healthyspinedoc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/healthyspinedoc.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/hivandanoc;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://maps.googleapis.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://maps.googleapis.com https://maps.gstatic.com; frame-src 'self' https://www.google.com https://maps.google.com https://www.openstreetmap.org; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://formsubmit.co" always;
