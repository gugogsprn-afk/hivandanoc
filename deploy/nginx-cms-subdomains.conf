# Healthy Spine — production with CMS subdomains
# healthyspinedoc.com          → public static site
# admin.healthyspinedoc.com    → admin CMS panel
# api.healthyspinedoc.com      → Node.js API (CMS + forms)

# ─── Public website ───────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name healthyspinedoc.com www.healthyspinedoc.com;

    root /var/www/hivandanoc;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Public site proxies API calls to backend (optional same-origin)
    location /api/ {
        proxy_pass http://127.0.0.1:8765/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?|json|xml|txt)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}

# ─── Admin CMS panel ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name admin.healthyspinedoc.com;

    root /var/www/hivandanoc/admin-cms;
    index index.html;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Shared brand images
    location /images/ {
        alias /var/www/hivandanoc/images/;
        expires 7d;
    }
}

# ─── API backend ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.healthyspinedoc.com;

    client_max_body_size 12M;

    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Legacy: IP direct access (single-server setup before DNS)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 173.212.240.38 vmi3379806.contaboserver.net;

    root /var/www/hivandanoc;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8765/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin-cms/ {
        alias /var/www/hivandanoc/admin-cms/;
        try_files $uri $uri/ /admin-cms/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
