<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#064e3b">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>CHIC CMS — Healthy Spine</title>
  <link rel="icon" href="../images/brand/logo-chic.png" type="image/png">
  <link rel="stylesheet" href="css/admin-cms.css?v=20260627">
  <script src="js/build.js?v=20260627"></script>
  <script>
    (function () {
      var k = 'cms_admin_build';
      var v = window.CMS_BUILD || '20260627';
      if (localStorage.getItem(k) && localStorage.getItem(k) !== v) {
        localStorage.setItem(k, v);
        var u = new URL(location.href);
        u.searchParams.set('_cb', v);
        location.replace(u.toString());
        return;
      }
      localStorage.setItem(k, v);
    })();
  </script>
</head>
<body>
  <!-- Login -->
  <div id="login-screen" class="cms-login" hidden>
    <div class="cms-login__bg" aria-hidden="true"></div>
    <form id="login-form" class="cms-login__card">
      <div class="cms-login__logo">
        <img src="../images/brand/logo-chic.png" alt="" width="72" height="72">
        <div>
          <h1>Healthy Spine</h1>
          <p>Content Management System</p>
        </div>
      </div>
      <div class="cms-field">
        <label for="login-email">Email address</label>
        <input id="login-email" type="email" name="email" required autocomplete="username" placeholder="admin@healthyspinedoc.com">
      </div>
      <div class="cms-field">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <p id="login-error" class="cms-alert cms-alert--error" hidden role="alert"></p>
      <button type="submit" class="cms-btn cms-btn--primary cms-btn--block">Sign in</button>
      <p class="cms-login__hint">CHIC NGO · Առողջ ողնաշար · Staff only</p>
    </form>
  </div>

  <!-- App shell -->
  <div id="app-shell" class="cms-app" hidden>
    <div id="sidebar-overlay" class="cms-sidebar-overlay"></div>

    <aside class="cms-sidebar" id="cms-sidebar">
      <div class="cms-sidebar__brand">
        <img src="../images/brand/logo-chic.png" alt="" width="40" height="40">
        <div>
          <strong>CHIC CMS</strong>
          <span>Healthy Spine</span>
        </div>
      </div>

      <nav class="cms-nav" id="main-nav" aria-label="Admin navigation">
        <button type="button" data-view="dashboard" class="active">
          <span class="cms-nav__icon" data-icon="dashboard"></span>
          <span>Dashboard</span>
        </button>
        <button type="button" data-view="leads">
          <span class="cms-nav__icon" data-icon="leads"></span>
          <span>Leads & Appointments</span>
        </button>
        <button type="button" data-view="pages">
          <span class="cms-nav__icon" data-icon="homepage"></span>
          <span>Pages</span>
        </button>
        <button type="button" data-view="doctors">
          <span class="cms-nav__icon" data-icon="doctors"></span>
          <span>Doctors</span>
        </button>
        <button type="button" data-view="services">
          <span class="cms-nav__icon" data-icon="services"></span>
          <span>Services</span>
        </button>
        <button type="button" data-view="media">
          <span class="cms-nav__icon" data-icon="media"></span>
          <span>Media Library</span>
        </button>
        <button type="button" data-view="settings">
          <span class="cms-nav__icon" data-icon="settings"></span>
          <span>Global Settings</span>
        </button>
      </nav>

      <div class="cms-sidebar__foot">
        <a href="../index.html" target="_blank" rel="noopener" class="cms-btn cms-btn--outline cms-btn--block">
          View public website ↗
        </a>
        <button type="button" id="logout-btn" class="cms-btn cms-btn--ghost cms-btn--block">Sign out</button>
      </div>
    </aside>

    <div class="cms-content">
      <header class="cms-topbar">
        <div class="cms-topbar__left">
          <button type="button" id="sidebar-toggle" class="cms-icon-btn" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
            <h1 id="view-title">Dashboard</h1>
            <p class="cms-topbar__sub" id="view-subtitle">Overview of clinic activity</p>
          </div>
        </div>
        <div class="cms-topbar__user">
          <span id="user-role" class="cms-badge"></span>
          <span id="user-email" class="cms-topbar__email"></span>
        </div>
      </header>

      <main class="cms-main">
        <section id="view-dashboard" class="cms-view"></section>
        <section id="view-leads" class="cms-view" hidden></section>
        <section id="view-pages" class="cms-view" hidden></section>
        <section id="view-doctors" class="cms-view" hidden></section>
        <section id="view-services" class="cms-view" hidden></section>
        <section id="view-media" class="cms-view" hidden></section>
        <section id="view-settings" class="cms-view" hidden></section>
      </main>
    </div>
  </div>

  <div id="cms-toast" class="cms-toast" role="status" aria-live="polite"></div>

  <script src="js/config.js?v=20260627"></script>
  <script src="js/ui.js?v=20260627"></script>
  <script src="js/api.js?v=20260627"></script>
  <script src="js/page-editor.js?v=20260627"></script>
  <script src="js/app.js?v=20260627"></script>
</body>
</html>
